<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реестр судебных дел</title>
<style>
  :root{
    --ink:#1c2333;
    --ink-soft:#4a5268;
    --paper:#f6f4ee;
    --paper-card:#ffffff;
    --line:#d8d3c4;
    --accent:#8a2f1f;
    --accent-soft:#f1e4dd;
    --ok:#34603f;
    --ok-bg:#e7efe5;
    --warn:#8a6a1f;
    --warn-bg:#f3ecd9;
    --closed:#6b6f76;
    --closed-bg:#e9e8e4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Georgia', 'Times New Roman', serif;
    -webkit-font-smoothing:antialiased;
  }
  .utility{font-family:'Helvetica Neue', Arial, sans-serif;}

  header{
    padding:28px 20px 18px;
    border-bottom:1px solid var(--line);
    background:var(--paper);
  }
  header .eyebrow{
    font-family:'Helvetica Neue', Arial, sans-serif;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--accent);
    margin:0 0 6px;
  }
  header h1{
    margin:0;
    font-size:26px;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  header p.sub{
    margin:6px 0 0;
    color:var(--ink-soft);
    font-size:14px;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }

  .container{
    max-width:880px;
    margin:0 auto;
    padding:20px;
  }

  .api-bar{
    display:flex;
    gap:8px;
    align-items:center;
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:20px;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .api-bar label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .api-bar input{
    flex:1;
    border:none;
    background:transparent;
    font-size:13px;
    color:var(--ink);
    outline:none;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .api-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--closed);
    flex-shrink:0;
  }
  .api-dot.ok{background:var(--ok);}
  .api-dot.bad{background:var(--accent);}

  .toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:18px;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .toolbar input[type=text], .toolbar select{
    border:1px solid var(--line);
    background:var(--paper-card);
    border-radius:6px;
    padding:8px 10px;
    font-size:13px;
    color:var(--ink);
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .toolbar input[type=text]{flex:1; min-width:140px;}
  .btn{
    border:1px solid var(--ink);
    background:var(--ink);
    color:#fff;
    border-radius:6px;
    padding:9px 16px;
    font-size:13px;
    cursor:pointer;
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-weight:500;
    transition:opacity .15s ease;
  }
  .btn:hover{opacity:.85;}
  .btn.secondary{
    background:transparent;
    color:var(--ink);
  }

  .case-card{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-left:3px solid var(--ink);
    border-radius:6px;
    padding:16px 18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .case-card:hover{
    box-shadow:0 2px 10px rgba(28,35,51,0.06);
  }
  .case-card .row1{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
  }
  .case-card .num{
    font-size:12px;
    color:var(--ink-soft);
    font-family:'Helvetica Neue', Arial, sans-serif;
    letter-spacing:.02em;
  }
  .case-card h3{
    margin:4px 0 6px;
    font-size:18px;
    font-weight:600;
  }
  .case-card .meta{
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    display:flex;
    flex-wrap:wrap;
    gap:4px 14px;
    margin-top:6px;
  }
  .badge{
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.06em;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
    font-weight:600;
  }
  .badge.open{background:var(--accent-soft); color:var(--accent);}
  .badge.in_court{background:var(--warn-bg); color:var(--warn);}
  .badge.appeal{background:var(--warn-bg); color:var(--warn);}
  .badge.suspended{background:var(--closed-bg); color:var(--closed);}
  .badge.closed{background:var(--ok-bg); color:var(--ok);}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .empty .mark{font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:8px;}

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(28,23,18,0.45);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:30px 16px;
    overflow-y:auto;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--paper-card);
    border-radius:10px;
    max-width:520px;
    width:100%;
    padding:26px 26px 22px;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .modal h2{
    font-family:'Georgia', serif;
    font-size:20px;
    margin:0 0 18px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.07em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 10px;
    font-size:14px;
    font-family:'Helvetica Neue', Arial, sans-serif;
    color:var(--ink);
    background:var(--paper);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:20px;
  }
  .modal-actions .left{display:flex; gap:10px;}
  .danger-link{
    background:none; border:none;
    color:var(--accent);
    font-size:13px;
    cursor:pointer;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .msg{
    font-size:12px;
    margin-top:10px;
    font-family:'Helvetica Neue', Arial, sans-serif;
  }
  .msg.error{color:var(--accent);}
  .msg.ok{color:var(--ok);}

  @media (max-width:480px){
    .field-row{flex-direction:column; gap:0;}
    header h1{font-size:22px;}
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow utility">Реестр &middot; Дела в работе</p>
  <h1>Судебные дела</h1>
  <p class="sub">Карточки дел, статусы и ближайшие заседания — в одном месте.</p>
</header>

<div class="container">

  <div class="api-bar">
    <span class="api-dot" id="apiDot"></span>
    <label class="utility">API</label>
    <input id="apiUrl" type="text" value="https://lawyer-cases.onrender.com" />
    <button class="btn secondary" style="padding:6px 12px; font-size:12px;" onclick="checkApi()">Проверить</button>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Поиск по клиенту или номеру дела…" oninput="loadCases()" />
    <select id="statusFilter" onchange="loadCases()">
      <option value="">Все статусы</option>
      <option value="open">В производстве</option>
      <option value="in_court">В суде</option>
      <option value="appeal">Обжалование</option>
      <option value="suspended">Приостановлено</option>
      <option value="closed">Закрыто</option>
    </select>
    <button class="btn" onclick="openModal()">+ Новое дело</button>
  </div>

  <div id="list"></div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Новое дело</h2>
    <input type="hidden" id="caseId" />

    <div class="field">
      <label>Номер дела *</label>
      <input id="f_case_number" type="text" placeholder="А40-12345/2026" />
    </div>

    <div class="field">
      <label>Клиент *</label>
      <input id="f_client_name" type="text" placeholder="ФИО или организация" />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Противоположная сторона</label>
        <input id="f_opposing_party" type="text" />
      </div>
      <div class="field">
        <label>Суд</label>
        <input id="f_court_name" type="text" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Судья</label>
        <input id="f_judge_name" type="text" />
      </div>
      <div class="field">
        <label>Сумма иска (руб)</label>
        <input id="f_claim_amount" type="number" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Статус</label>
        <select id="f_status">
          <option value="open">В производстве</option>
          <option value="in_court">В суде</option>
          <option value="appeal">Обжалование</option>
          <option value="suspended">Приостановлено</option>
          <option value="closed">Закрыто</option>
        </select>
      </div>
      <div class="field">
        <label>Дата заседания</label>
        <input id="f_next_hearing_date" type="date" />
      </div>
    </div>

    <div class="field">
      <label>Суть дела</label>
      <textarea id="f_description" placeholder="Краткое описание…"></textarea>
    </div>

    <div class="field">
      <label>Ответственный</label>
      <input id="f_responsible" type="text" placeholder="Ваше ФИО" />
    </div>

    <div class="msg" id="modalMsg"></div>

    <div class="modal-actions">
      <div class="left">
        <button class="btn" onclick="saveCase()">Сохранить</button>
        <button class="btn secondary" onclick="closeModal()">Отмена</button>
      </div>
      <button class="danger-link" id="deleteBtn" style="display:none" onclick="deleteCase()">Удалить дело</button>
    </div>
  </div>
</div>

<script>
let apiBase = 'https://lawyer-cases.onrender.com';

const statusLabels = {
  open: 'В производстве',
  in_court: 'В суде',
  appeal: 'Обжалование',
  suspended: 'Приостановлено',
  closed: 'Закрыто'
};

const statusColors = {
  open: 'open',
  in_court: 'in_court',
  appeal: 'appeal',
  suspended: 'suspended',
  closed: 'closed'
};

async function checkApi(){
  const dot = document.getElementById('apiDot');
  try{
    const res = await fetch(apiBase + '/');
    if(res.ok){
      dot.className = 'api-dot ok';
      loadCases();
    } else {
      dot.className = 'api-dot bad';
    }
  }catch(e){
    dot.className = 'api-dot bad';
  }
}

async function loadCases(){
  const status = document.getElementById('statusFilter').value;
  const search = document.getElementById('searchInput').value.trim();
  
  const params = new URLSearchParams();
  if(status) params.set('status', status);
  if(search) {
    params.set('client_name', search);
    params.set('case_number', search);
  }

  const list = document.getElementById('list');
  try{
    const res = await fetch(apiBase + '/cases?' + params.toString());
    if(!res.ok) throw new Error('Ошибка сервера');
    const data = await res.json();
    renderList(data.items || data);
  }catch(e){
    list.innerHTML = `<div class="empty"><div class="mark">Нет связи</div>Не удаётся получить данные.<br>Проверьте, что сервер запущен.</div>`;
  }
}

function renderList(cases){
  const list = document.getElementById('list');
  if(!cases || cases.length === 0){
    list.innerHTML = `<div class="empty"><div class="mark">Пусто</div>Дел не найдено. Добавьте первое дело.</div>`;
    return;
  }
  
  list.innerHTML = cases.map(c => `
    <div class="case-card" onclick='openModal(${JSON.stringify(c).replace(/'/g, "&#39;")})'>
      <div class="row1">
        <span class="num utility">№ ${escapeHtml(c.case_number)}</span>
        <span class="badge ${statusColors[c.status] || 'open'}">${statusLabels[c.status] || c.status}</span>
      </div>
      <h3>${escapeHtml(c.client_name)}</h3>
      <div class="meta">
        ${c.court_name ? `<span>${escapeHtml(c.court_name)}</span>` : ''}
        ${c.opposing_party ? `<span>против: ${escapeHtml(c.opposing_party)}</span>` : ''}
        ${c.judge_name ? `<span>судья: ${escapeHtml(c.judge_name)}</span>` : ''}
        ${c.next_hearing_date ? `<span>заседание: ${c.next_hearing_date}</span>` : ''}
        ${c.claim_amount ? `<span>${c.claim_amount.toLocaleString('ru-RU')} ₽</span>` : ''}
      </div>
    </div>
  `).join('');
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function openModal(c){
  document.getElementById('modalMsg').textContent = '';
  const isEdit = !!c;
  
  if(isEdit){
    document.getElementById('modalTitle').textContent = 'Дело №' + c.case_number;
    document.getElementById('caseId').value = c.id;
    document.getElementById('f_case_number').value = c.case_number || '';
    document.getElementById('f_client_name').value = c.client_name || '';
    document.getElementById('f_opposing_party').value = c.opposing_party || '';
    document.getElementById('f_court_name').value = c.court_name || '';
    document.getElementById('f_judge_name').value = c.judge_name || '';
    document.getElementById('f_claim_amount').value = c.claim_amount || '';
    document.getElementById('f_status').value = c.status || 'open';
    document.getElementById('f_next_hearing_date').value = c.next_hearing_date || '';
    document.getElementById('f_description').value = c.description || '';
    document.getElementById('f_responsible').value = c.responsible || '';
    document.getElementById('deleteBtn').style.display = 'inline-block';
  } else {
    document.getElementById('modalTitle').textContent = 'Новое дело';
    document.getElementById('caseId').value = '';
    document.getElementById('f_case_number').value = '';
    document.getElementById('f_client_name').value = '';
    document.getElementById('f_opposing_party').value = '';
    document.getElementById('f_court_name').value = '';
    document.getElementById('f_judge_name').value = '';
    document.getElementById('f_claim_amount').value = '';
    document.getElementById('f_status').value = 'open';
    document.getElementById('f_next_hearing_date').value = '';
    document.getElementById('f_description').value = '';
    document.getElementById('f_responsible').value = '';
    document.getElementById('deleteBtn').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
}

async function saveCase(){
  const id = document.getElementById('caseId').value;
  const payload = {
    case_number: document.getElementById('f_case_number').value.trim(),
    client_name: document.getElementById('f_client_name').value.trim(),
    opposing_party: document.getElementById('f_opposing_party').value.trim() || null,
    court_name: document.getElementById('f_court_name').value.trim() || null,
    judge_name: document.getElementById('f_judge_name').value.trim() || null,
    claim_amount: parseInt(document.getElementById('f_claim_amount').value) || null,
    status: document.getElementById('f_status').value,
    next_hearing_date: document.getElementById('f_next_hearing_date').value || null,
    description: document.getElementById('f_description').value.trim() || null,
    responsible: document.getElementById('f_responsible').value.trim() || null
  };

  if(!payload.case_number || !payload.client_name){
    showModalMsg('Укажите номер дела и клиента.', 'error');
    return;
  }

  try{
    const url = id ? `${apiBase}/cases/${id}` : `${apiBase}/cases`;
    const method = id ? 'PUT' : 'POST';
    
    const res = await fetch(url, {
      method: method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Ошибка при сохранении');
    }

    showModalMsg('Сохранено успешно!', 'ok');
    setTimeout(() => {
      closeModal();
      loadCases();
    }, 800);
  }catch(e){
    showModalMsg(e.message, 'error');
  }
}

function showModalMsg(text, type){
  const msgEl = document.getElementById('modalMsg');
  msgEl.textContent = text;
  msgEl.className = `msg ${type}`;
}

async function deleteCase(){
  const id = document.getElementById('caseId').value;
  if(!id) return;
  if(!confirm('Удалить это дело?')) return;

  try{
    const res = await fetch(`${apiBase}/cases/${id}`, {method: 'DELETE'});
    if(!res.ok) throw new Error('Не удалось удалить');
    closeModal();
    loadCases();
  }catch(e){
    showModalMsg(e.message, 'error');
  }
}

// Инициализация
window.onload = () => {
  checkApi();
  document.getElementById('overlay').addEventListener('click', (e) => {
    if(e.target.id === 'overlay') closeModal();
  });
};
</script>

</body>
</html>
