<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реестр судебных дел</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .notion-page { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r border-gray-200 p-4 flex flex-col">
    <h1 class="font-semibold text-xl mb-8 px-3">Судебные дела</h1>
    
    <div class="space-y-1 mb-8">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-600 font-medium">
        <i class="fas fa-folder"></i> Все дела
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-100">
        <i class="fas fa-calendar"></i> Календарь
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-100">
        <i class="fas fa-archive"></i> Архив
      </a>
    </div>

    <button onclick="openNewCaseModal()" 
            class="w-full bg-blue-600 text-white py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-blue-700">
      <i class="fas fa-plus"></i> Новое дело
    </button>
  </div>

  <!-- Main Content -->
  <div class="flex-1 overflow-auto">
    <div class="max-w-4xl mx-auto p-8">
      <h2 class="text-3xl font-semibold mb-8">Все дела</h2>

      <div id="cases-list" class="space-y-3"></div>
    </div>
  </div>

  <!-- Right Sidebar / Preview -->
  <div id="case-detail" class="w-96 bg-white border-l border-gray-200 hidden overflow-auto">
    <div class="p-6 sticky top-0 bg-white border-b">
      <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
    <div id="detail-content" class="p-6"></div>
  </div>
</div>

<!-- New Case Modal -->
<div id="new-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white rounded-3xl p-8 w-full max-w-md">
    <h3 class="text-2xl font-semibold mb-6">Новое судебное дело</h3>
    <!-- Форма здесь -->
    <button onclick="createCase()" class="w-full bg-blue-600 text-white py-4 rounded-2xl">Создать дело</button>
  </div>
</div>

<script>
let apiBase = "https://lawyer-cases.onrender.com";
let currentCases = [];

async function loadCases() {
  try {
    const res = await fetch(apiBase + '/cases');
    currentCases = await res.json();
    renderCases();
  } catch(e) {}
}

function renderCases() {
  const container = document.getElementById('cases-list');
  container.innerHTML = currentCases.map(c => `
    <div onclick="openCaseDetail(${c.id})" class="bg-white border border-gray-200 rounded-2xl p-5 hover:border-blue-300 cursor-pointer flex gap-4">
      <div class="flex-1">
        <div class="font-medium">${c.case_number}</div>
        <div class="text-lg font-semibold mt-1">${c.client_name}</div>
        ${c.next_hearing_date ? `<div class="text-sm text-gray-500 mt-2">Заседание: ${c.next_hearing_date}</div>` : ''}
      </div>
      <div class="text-right">
        <span class="inline-block px-3 py-1 text-xs rounded-full bg-blue-100 text-blue-700">${c.status}</span>
      </div>
    </div>
  `).join('');
}

function openCaseDetail(id) {
  const caseData = currentCases.find(c => c.id === id);
  if (!caseData) return;

  document.getElementById('case-detail').classList.remove('hidden');
  document.getElementById('detail-content').innerHTML = `
    <div class="notion-page">
      <h1 class="text-4xl font-semibold mb-2">${caseData.case_number}</h1>
      <p class="text-2xl text-gray-600">${caseData.client_name}</p>
      
      <div class="mt-10 grid grid-cols-2 gap-8">
        <div>
          <h3 class="font-medium text-gray-500 mb-3">Основная информация</h3>
          <div class="space-y-4">
            <div><span class="text-gray-500">Суд:</span> ${caseData.court_name || '—'}</div>
            <div><span class="text-gray-500">Дата заседания:</span> ${caseData.next_hearing_date || '—'}</div>
            <div><span class="text-gray-500">Статус:</span> ${caseData.status}</div>
          </div>
        </div>
        
        <div>
          <h3 class="font-medium text-gray-500 mb-3">Документы</h3>
          <div class="border border-dashed border-gray-300 rounded-2xl p-8 text-center text-gray-400">
            <i class="fas fa-cloud-upload-alt text-3xl mb-3"></i>
            <p>Перетащите документы сюда</p>
          </div>
        </div>
      </div>

      <div class="mt-12">
        <h3 class="font-medium text-gray-500 mb-4">Заметки и таймлайн</h3>
        <textarea class="w-full h-40 border border-gray-200 rounded-2xl p-5" placeholder="Напишите заметку..."></textarea>
      </div>
    </div>
  `;
}

function closeDetail() {
  document.getElementById('case-detail').classList.add('hidden');
}

function openNewCaseModal() {
  document.getElementById('new-modal').classList.remove('hidden');
}

function createCase() {
  alert("Дело создано! (функционал в разработке)");
  document.getElementById('new-modal').classList.add('hidden');
  loadCases();
}

// Запуск
window.onload = loadCases;
</script>
</body>
</html>
