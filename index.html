<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реестр судебных дел</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .tab-active { border-bottom: 3px solid #2563eb; font-weight: 600; color: #1e3a8a; }
  </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r p-6">
    <h1 class="text-2xl font-bold mb-6">Судебные дела</h1>
    <button onclick="openNewCaseModal()" class="w-full bg-blue-600 text-white py-3 rounded-2xl flex items-center justify-center gap-2 mb-8">
      <i class="fas fa-plus"></i> Новое дело
    </button>
  </div>

  <!-- List -->
  <div class="flex-1 p-8 overflow-auto">
    <h2 class="text-3xl font-semibold mb-8">Все дела</h2>
    <div id="cases-list" class="space-y-4"></div>
  </div>

  <!-- Detail View -->
  <div id="detail-panel" class="w-96 bg-white border-l shadow-2xl overflow-auto hidden flex-col">
    <div class="p-6 border-b flex justify-between sticky top-0 bg-white">
      <h2 id="detail-title" class="font-semibold text-xl"></h2>
      <button onclick="closeDetail()" class="text-2xl text-gray-400">✕</button>
    </div>
    
    <!-- Tabs -->
    <div class="flex border-b px-6 bg-white">
      <button onclick="switchTab(0)" id="tab0" class="tab-active px-5 py-4">Инфо</button>
      <button onclick="switchTab(1)" id="tab1" class="px-5 py-4 text-gray-500">Документы</button>
      <button onclick="switchTab(2)" id="tab2" class="px-5 py-4 text-gray-500">Контакты</button>
      <button onclick="switchTab(3)" id="tab3" class="px-5 py-4 text-gray-500">Задачи</button>
    </div>

    <div id="tab-content" class="p-6 flex-1"></div>
  </div>
</div>

<!-- New Case Modal -->
<div id="new-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-md p-8">
    <h3 class="text-2xl font-semibold mb-6">Новое дело</h3>
    <div class="space-y-5">
      <input id="new_number" placeholder="Номер дела *" class="w-full border border-gray-300 rounded-2xl px-5 py-3">
      <input id="new_client" placeholder="Клиент *" class="w-full border border-gray-300 rounded-2xl px-5 py-3">
      <input id="new_court" placeholder="Суд" class="w-full border border-gray-300 rounded-2xl px-5 py-3">
      <input id="new_date" type="date" class="w-full border border-gray-300 rounded-2xl px-5 py-3">
    </div>
    <div class="flex gap-3 mt-8">
      <button onclick="createCase()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl">Создать</button>
      <button onclick="closeNewModal()" class="flex-1 bg-gray-100 py-4 rounded-2xl">Отмена</button>
    </div>
  </div>
</div>

<script>
const apiBase = "https://lawyer-cases.onrender.com";

async function loadCases() {
  const res = await fetch(apiBase + "/cases");
  const cases = await res.json();
  renderList(cases);
}

function renderList(cases) {
  document.getElementById("cases-list").innerHTML = cases.map(c => `
    <div onclick="openDetail(${c.id})" class="bg-white p-6 rounded-3xl border hover:border-blue-400 cursor-pointer">
      <div class="font-mono text-sm">${c.case_number}</div>
      <div class="text-xl font-semibold mt-1">${c.client_name}</div>
    </div>
  `).join('');
}

let currentCase = null;

async function openDetail(id) {
  const res = await fetch(`${apiBase}/cases/${id}`);
  currentCase = await res.json();
  document.getElementById("detail-panel").classList.remove("hidden");
  document.getElementById("detail-title").textContent = currentCase.case_number;
  switchTab(0);
}

function closeDetail() {
  document.getElementById("detail-panel").classList.add("hidden");
}

function switchTab(n) {
  document.querySelectorAll("#tab-content").forEach(el => {});
  const tabs = document.querySelectorAll('[id^="tab"]');
  tabs.forEach(t => t.classList.remove("tab-active"));
  document.getElementById("tab" + n).classList.add("tab-active");

  const content = document.getElementById("tab-content");
  if (n === 0) {
    content.innerHTML = `<p><strong>Клиент:</strong> ${currentCase.client_name}</p><p><strong>Суд:</strong> ${currentCase.court_name || '-'}</p>`;
  } else {
    content.innerHTML = `<p class="text-gray-400">Раздел в разработке...</p>`;
  }
}

function openNewCaseModal() {
  document.getElementById("new-modal").classList.remove("hidden");
}

function closeNewModal() {
  document.getElementById("new-modal").classList.add("hidden");
}

async function createCase() {
  const payload = {
    case_number: document.getElementById("new_number").value,
    client_name: document.getElementById("new_client").value,
    court_name: document.getElementById("new_court").value,
    next_hearing_date: document.getElementById("new_date").value,
    status: "open"
  };

  if (!payload.case_number || !payload.client_name) return alert("Заполните обязательные поля");

  await fetch(apiBase + "/cases", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  closeNewModal();
  loadCases();
}

window.onload = loadCases;
</script>
</body>
</html>м
