<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реестр судебных дел</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .tab-active { border-bottom: 3px solid #2563eb; color: #1e40af; font-weight: 600; }
    .case-card { transition: all 0.2s; }
    .case-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-gray-50 flex h-screen">

<!-- Sidebar -->
<div class="w-72 bg-white border-r border-gray-200 p-6 flex flex-col">
  <h1 class="text-2xl font-bold text-gray-900 mb-8">Судебные дела</h1>
  <button onclick="openNewCaseModal()" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl flex items-center justify-center gap-2 font-medium mb-8">
    <i class="fas fa-plus"></i> Новое дело
  </button>
  <div class="space-y-1 text-gray-600">
    <div class="px-4 py-3 bg-blue-50 text-blue-700 rounded-2xl font-medium flex items-center gap-3">
      <i class="fas fa-folder"></i> Все дела
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="flex-1 overflow-auto p-8">
  <h2 class="text-3xl font-semibold mb-8">Все дела</h2>
  <div id="cases-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<!-- Detail Panel (Notion style) -->
<div id="detail-panel" class="w-2/5 bg-white border-l shadow-2xl flex flex-col hidden overflow-hidden">
  <div class="p-6 border-b flex items-center justify-between bg-white sticky top-0">
    <h2 id="detail-title" class="text-2xl font-semibold"></h2>
    <button onclick="closeDetail()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
  </div>

  <!-- Tabs -->
  <div class="flex border-b px-6 bg-white">
    <button onclick="switchTab(0)" id="tab-0" class="tab-active px-6 py-4">Информация</button>
    <button onclick="switchTab(1)" id="tab-1" class="px-6 py-4 text-gray-500 hover:text-gray-700">Документы</button>
    <button onclick="switchTab(2)" id="tab-2" class="px-6 py-4 text-gray-500 hover:text-gray-700">Контакты</button>
    <button onclick="switchTab(3)" id="tab-3" class="px-6 py-4 text-gray-500 hover:text-gray-700">Задачи</button>
  </div>

  <div id="tab-content" class="flex-1 p-6 overflow-auto bg-gray-50"></div>
</div>

<!-- New Case Modal -->
<div id="new-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-md mx-4 p-8">
    <h3 class="text-2xl font-semibold mb-6">Новое дело</h3>
    <div class="space-y-5">
      <div>
        <label class="block text-sm text-gray-500 mb-1">Номер дела *</label>
        <input id="new_number" class="w-full px-5 py-3 border border-gray-300 rounded-2xl" placeholder="А40-12345/2026">
      </div>
      <div>
        <label class="block text-sm text-gray-500 mb-1">Клиент *</label>
        <input id="new_client" class="w-full px-5 py-3 border border-gray-300 rounded-2xl" placeholder="ФИО клиента">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-gray-500 mb-1">Суд</label>
          <input id="new_court" class="w-full px-5 py-3 border border-gray-300 rounded-2xl">
        </div>
        <div>
          <label class="block text-sm text-gray-500 mb-1">Дата заседания</label>
          <input id="new_date" type="date" class="w-full px-5 py-3 border border-gray-300 rounded-2xl">
        </div>
      </div>
    </div>
    <div class="flex gap-3 mt-8">
      <button onclick="createCase()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-medium">Создать дело</button>
      <button onclick="closeNewModal()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-medium">Отмена</button>
    </div>
  </div>
</div>

<script>
const apiBase = "https://lawyer-cases.onrender.com";
let currentCase = null;

async function loadCases() {
  try {
    const res = await fetch(`${apiBase}/cases`);
    const cases = await res.json();
    renderCases(cases);
  } catch (e) {
    console.error(e);
  }
}

function renderCases(cases) {
  const container = document.getElementById('cases-list');
  container.innerHTML = cases.map(c => `
    <div onclick="openDetail(${c.id})" class="case-card bg-white border border-gray-200 rounded-3xl p-6 cursor-pointer hover:shadow-md">
      <div class="font-mono text-xs text-gray-400">${c.case_number}</div>
      <div class="font-semibold text-xl mt-2">${c.client_name}</div>
      ${c.next_hearing_date ? `<div class="text-sm text-gray-500 mt-3">Заседание: ${c.next_hearing_date}</div>` : ''}
    </div>
  `).join('');
}

async function openDetail(id) {
  try {
    const res = await fetch(`${apiBase}/cases/${id}`);
    currentCase = await res.json();
    document.getElementById('detail-panel').classList.remove('hidden');
    document.getElementById('detail-title').textContent = currentCase.case_number;
    switchTab(0);
  } catch(e) {}
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
}

function switchTab(n) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('tab-active'));
  document.getElementById(`tab-${n}`).classList.add('tab-active');

  const content = document.getElementById('tab-content');
  if (n === 0) {
    content.innerHTML = `
      <div class="prose">
        <h3 class="font-semibold">Основная информация</h3>
        <p><strong>Клиент:</strong> ${currentCase.client_name}</p>
        <p><strong>Суд:</strong> ${currentCase.court_name || '—'}</p>
        <p><strong>Дата заседания:</strong> ${currentCase.next_hearing_date || '—'}</p>
        <p><strong>Статус:</strong> ${currentCase.status}</p>
      </div>`;
  } else {
    content.innerHTML = `<div class="text-gray-400 py-12 text-center">Раздел "${['Информация','Документы','Контакты','Задачи'][n]}" в активной разработке</div>`;
  }
}

function openNewCaseModal() {
  document.getElementById('new-modal').classList.remove('hidden');
}

function closeNewModal() {
  document.getElementById('new-modal').classList.add('hidden');
}

async function createCase() {
  const payload = {
    case_number: document.getElementById('new_number').value.trim(),
    client_name: document.getElementById('new_client').value.trim(),
    court_name: document.getElementById('new_court').value.trim(),
    next_hearing_date: document.getElementById('new_date').value || null,
    status: "open"
  };

  if (!payload.case_number || !payload.client_name) {
    alert("Пожалуйста, заполните номер дела и клиента");
    return;
  }

  try {
    const res = await fetch(`${apiBase}/cases`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alert("Дело успешно создано!");
      closeNewModal();
      loadCases();
    } else {
      alert("Ошибка при создании дела");
    }
  } catch(e) {
    alert("Ошибка соединения с сервером");
  }
}

window.onload = loadCases;
</script>
</body>
</html>
